<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>משחק קלפים רשת</title>
    <style>
        :root {
            --bg-color: #1e272e;
            --table-bg: #218c53;
            --card-bg: #f5f6fa;
            --primary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --text: #2f3640;
            --host-color: #f39c12;
            --panel-bg: rgba(0, 0, 0, 0.6);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
        }

        /* ניהול מסכים */
        .screen { display: none; width: 100%; height: 100%; }
        .screen.active { display: flex; flex-direction: column; }

        /* מסכי פתיחה ולובי */
        .menu-container {
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: auto;
        }
        .menu-container h1 { margin-top: 0; font-size: 2.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .menu-container p { font-size: 1.2rem; color: #bdc3c7; margin-bottom: 30px; }
        
        .players-list-box {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            min-height: 100px;
            margin-bottom: 20px;
            text-align: right;
        }
        .players-list-box p { margin: 8px 0; font-size: 1.1rem; font-weight: bold; color: white; }
        
        .start-btn-container { min-height: 60px; }

        /* לוח משחק */
        #game-board { 
            background-color: var(--table-bg);
            justify-content: space-between;
            box-sizing: border-box;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
            position: relative;
        }

        /* הגדרות כפתור מנהל */
        .host-controls { display: none; position: absolute; top: 10px; right: 10px; z-index: 10; }
        .host-text { color: var(--host-color); font-size: 0.85em; font-weight: bold; margin-right: 5px; }

        /* אזורי שולחן */
        .opponents-area { display: flex; justify-content: center; gap: 5vw; flex-wrap: wrap; padding: 15px 10px; min-height: 15vh; align-items: flex-start; }
        
        .center-area { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; 
            /* אפקט תאורת ספוטלייט למרכז השולחן */
            background: radial-gradient(circle, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0) 65%);
        }
        
        .local-player-area {
            display: flex; flex-direction: column; align-items: center; 
            border-top: 2px solid rgba(255,255,255,0.15); padding: 15px 5px 10px 5px;
            background: rgba(0,0,0,0.35); max-height: 45vh;
        }

        /* עמדת שחקן ועיצוב שמות וניקוד */
        .player-station { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        
        .player-badge-container {
            display: flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.3s;
        }
        
        .player-name {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: 900; /* פונט בולט מאוד */
            font-size: clamp(0.85rem, 3.5vw, 1.1rem);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap;
        }
        
        .player-score {
            background-color: var(--primary);
            color: white;
            width: clamp(28px, 8vw, 36px);
            height: clamp(28px, 8vw, 36px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
            border: 2px solid white;
        }

        /* שחקן מנותק */
        .offline .player-name { opacity: 0.5; text-decoration: line-through; background: #555; }
        .offline .player-score { filter: grayscale(100%); opacity: 0.5; }

        .played-card-slot {
            width: clamp(35px, 10vw, 60px); height: clamp(50px, 14vw, 85px); 
            border-radius: 6px;
            display: flex; justify-content: center; align-items: center;
            /* שקע בשולחן */
            background: rgba(0,0,0,0.15);
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(0,0,0,0.3);
        }

        .prize-img {
            width: clamp(70px, 20vw, 120px); height: clamp(105px, 30vw, 180px); object-fit: cover; border-radius: 8px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.5);
            animation: dropIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes dropIn { 0% { transform: translateY(-40px) scale(0.8); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }

        /* עיצוב תלת-ממד */
        .card-3d { width: 100%; height: 100%; perspective: 1000px; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-face {
            width: 100%; height: 100%; position: absolute; backface-visibility: hidden;
            display: flex; justify-content: center; align-items: center;
            border-radius: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            font-size: clamp(1rem, 4vw, 1.5rem); font-weight: bold; border: 1px solid white; box-sizing: border-box;
            background-size: cover; background-position: center;
        }
        .card-back-pattern { background: repeating-linear-gradient(45deg, #c0392b, #c0392b 8px, #e74c3c 8px, #e74c3c 16px); }
        .card-front-value {
            background-color: var(--card-bg); color: white; transform: rotateY(180deg);
            text-shadow: 1px 1px 3px black, -1px -1px 3px black;
        }

        /* יד השחקן */
        .hand-container { 
            display: flex; justify-content: center; flex-wrap: wrap; gap: 1.5vw; margin-top: 10px;
            overflow-y: auto; padding-bottom: 10px; width: 100%;
        }
        .hand-card {
            width: clamp(40px, 11vw, 65px); height: clamp(60px, 16vw, 95px); 
            background-color: var(--card-bg); color: white;
            border-radius: 6px; display: flex; justify-content: center; align-items: center;
            font-size: clamp(1.1rem, 4.5vw, 1.6rem); font-weight: 900; cursor: pointer; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s; border: 1px solid #bdc3c7;
            background-size: cover; background-position: center;
            text-shadow: 1px 1px 4px black, -1px -1px 4px black;
        }
        .hand-card:active { transform: scale(0.9); }
        .hand-card.disabled { opacity: 0.4; pointer-events: none; filter: grayscale(50%); box-shadow: none; }

        #status-message { font-size: clamp(0.9rem, 3.5vw, 1.2rem); margin-top: 15px; color: #f1c40f; font-weight: 900; text-align: center; white-space: pre-line; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        
        input, button { padding: 12px; font-size: 1.1rem; border: none; border-radius: 8px; margin: 5px; width: 100%; box-sizing: border-box; }
        button { background-color: var(--primary); color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { filter: brightness(1.1); }
        .btn-success { background-color: var(--success); font-size: 1.3rem; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn-danger { background-color: var(--danger); padding: 5px 10px; font-size: 0.9rem; width: auto; border-radius: 5px; }
    </style>
</head>
<body>

    <!-- מסך 1: התחברות -->
    <div id="login-screen" class="screen active">
        <div class="menu-container">
            <h1>Hol's der Geier</h1>
            <p>הכנס את שמך כדי להתחיל</p>
            <input type="text" id="playerName" placeholder="השם שלך..." maxlength="12">
            <button onclick="joinGame()">היכנס למשחק</button>
        </div>
    </div>

    <!-- מסך 2: חדר המתנה -->
    <div id="lobby-screen" class="screen">
        <div class="menu-container">
            <h2>חדר המתנה</h2>
            <div class="players-list-box" id="lobby-players"></div>
            <div class="start-btn-container">
                <button id="start-btn" class="btn-success" onclick="startGame()" style="display:none;">התחל את המשחק!</button>
                <p id="waiting-msg" style="display:none; color: #f39c12; font-weight: bold;">ממתין למנהל החדר שיתחיל את המשחק...</p>
            </div>
        </div>
    </div>

    <!-- מסך 3: לוח משחק -->
    <div id="game-board" class="screen">
        <div class="host-controls" id="host-controls">
            <button class="btn-danger" onclick="forceEndGame()">סיים משחק לכולם</button>
        </div>

        <div class="opponents-area" id="opponents-area"></div>

        <div class="center-area">
            <div id="prize-container"></div>
            <div id="status-message">טוען משחק...</div>
        </div>

        <div class="local-player-area">
            <div class="player-station">
                <div class="player-badge-container" id="local-player-info"></div>
                <div id="local-played-slot" class="played-card-slot"></div>
            </div>
            <div class="hand-container" id="my-hand"></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io('https://game-server-gwy6.onrender.com');
        let myHand = [];
        let isMyHost = false;
        
        let mySessionId = localStorage.getItem('holsSessionId');
        let myName = localStorage.getItem('holsPlayerName');

        if (!mySessionId) {
            mySessionId = 'player_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('holsSessionId', mySessionId);
        }

        socket.on('connect', () => {
            if (myName) {
                socket.emit('joinGame', { name: myName, sessionId: mySessionId });
            } else {
                switchScreen('login-screen');
            }
        });

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function getCardBackgroundImageUrl(val) {
            return `url('images/card_${val}.png')`;
        }

        function joinGame() {
            let nameInput = document.getElementById('playerName').value.trim();
            if (!nameInput) { alert("אנא הכנס שם."); return; }
            myName = nameInput;
            localStorage.setItem('holsPlayerName', myName);
            socket.emit('joinGame', { name: myName, sessionId: mySessionId });
        }

        function startGame() { socket.emit('startGame'); }
        function forceEndGame() { if(confirm("לסיים את המשחק לחלוטין ולחזור ללובי?")) socket.emit('forceEndGame'); }

        function playCard(index) {
            socket.emit('playCard', index);
            renderHand(true); 
            document.getElementById('status-message').innerText = "ממתין לשאר...";
        }

        function renderHand(disabled = false) {
            const handDiv = document.getElementById('my-hand');
            handDiv.innerHTML = '';
            myHand.forEach((val, index) => {
                const card = document.createElement('div');
                card.className = `hand-card ${disabled ? 'disabled' : ''}`;
                card.innerText = val;
                card.style.backgroundImage = getCardBackgroundImageUrl(val);
                card.onclick = () => playCard(index);
                handDiv.appendChild(card);
            });
        }

        function renderBoard(playersData, roundResultCards = null) {
            const opponentsDiv = document.getElementById('opponents-area');
            const localSlotDiv = document.getElementById('local-played-slot');
            opponentsDiv.innerHTML = '';
            localSlotDiv.innerHTML = '';

            for (let id in playersData) {
                const p = playersData[id];
                const isMe = (id === mySessionId);
                const statusClass = p.online ? '' : 'offline';
                const hostText = p.isHost ? '<span class="host-text">(מנהל)</span>' : '';
                
                let cardHtml = '';
                if (p.hasPlayed || roundResultCards) {
                    let cardVal = '';
                    let flippedClass = '';
                    let bgStyle = '';
                    
                    if (roundResultCards) {
                        const res = roundResultCards.find(rc => rc.id === id);
                        if (res) {
                            cardVal = res.card;
                            flippedClass = 'flipped';
                            bgStyle = `style="background-image: ${getCardBackgroundImageUrl(cardVal)};"`;
                        }
                    }

                    cardHtml = `
                        <div class="card-3d">
                            <div class="card-inner ${flippedClass}">
                                <div class="card-face card-back-pattern"></div>
                                <div class="card-face card-front-value" ${bgStyle}>${cardVal}</div>
                            </div>
                        </div>
                    `;
                }

                if (isMe) {
                    document.getElementById('local-player-info').innerHTML = `
                        <div class="player-name">אני ${hostText}</div>
                        <div class="player-score">${p.score}</div>
                    `;
                    if (cardHtml) localSlotDiv.innerHTML = cardHtml;
                } else {
                    const oppDiv = document.createElement('div');
                    oppDiv.className = 'player-station';
                    oppDiv.innerHTML = `
                        <div class="player-badge-container ${statusClass}" data-player-name="${p.name}">
                            <div class="player-name">${p.name} ${hostText}</div>
                            <div class="player-score">${p.score}</div>
                        </div>
                        <div class="played-card-slot">${cardHtml}</div>
                    `;
                    opponentsDiv.appendChild(oppDiv);
                }
            }
        }

        function setupGameUI(prize, roundCount, players, isResult = false) {
            switchScreen('game-board');
            document.getElementById('host-controls').style.display = isMyHost ? 'block' : 'none';
            
            const prizeDiv = document.getElementById('prize-container');
            if (prize !== null) {
                prizeDiv.innerHTML = `<img src="images/prize_${prize}.png" class="prize-img" alt="${prize}" onerror="this.onerror=null; this.outerHTML='<div class=\\'card-3d\\' style=\\'width: clamp(70px,20vw,120px); height: clamp(105px,30vw,180px);\\'><div class=\\'card-inner flipped\\'><div class=\\'card-face card-front-value\\'>${prize}</div></div></div>';">`;
            }
            
            if (!isResult) {
                renderBoard(players);
                renderHand(false);
                document.getElementById('status-message').innerText = `סיבוב ${roundCount} - בחר קלף!`;
            }
        }

        socket.on('joined', (data) => {
            myHand = data.player.hand;
            isMyHost = data.isHost;
            switchScreen('lobby-screen');
        });

        socket.on('rejoined', (data) => {
            myHand = data.player.hand;
            isMyHost = data.publicPlayers[mySessionId].isHost;
            
            if (data.gameState === 'waiting') {
                switchScreen('lobby-screen');
            } else if (data.gameState === 'playing') {
                setupGameUI(data.currentPrize, data.roundCount, data.publicPlayers);
                if (data.player.playedCard !== null) {
                    renderHand(true);
                    document.getElementById('status-message').innerText = "כבר שיחקת. ממתין לשאר...";
                }
            } else if (data.gameState === 'roundResult' && data.lastRoundResult) {
                setupGameUI(data.currentPrize, data.roundCount, data.publicPlayers, true);
                renderRoundResult(data.lastRoundResult);
            }
        });

        socket.on('updateLobby', (playersList) => {
            let html = '';
            playersList.forEach(p => {
                const hostText = p.isHost ? '<span class="host-text">(מנהל)</span>' : '';
                const status = p.online ? '' : ' (התנתק)';
                html += `<p class="${p.online ? '' : 'offline'}">${p.name} ${hostText}${status}</p>`;
                
                // עדכון תצוגת האופליין בזמן אמת בלוח המשחק במידה והוא פעיל
                const oppBadgeElements = document.querySelectorAll('.player-badge-container');
                oppBadgeElements.forEach(el => {
                    if (el.dataset.playerName === p.name) {
                        if (p.online) el.classList.remove('offline');
                        else el.classList.add('offline');
                    }
                });
            });
            document.getElementById('lobby-players').innerHTML = html || '<p>אין שחקנים עדיין</p>';
            
            const myData = playersList.find(p => p.isHost && p.online && p.name === myName);
            const startBtn = document.getElementById('start-btn');
            const waitingMsg = document.getElementById('waiting-msg');
            
            if (myData) { 
                isMyHost = true;
                if (playersList.length >= 2) {
                    startBtn.style.display = 'block';
                    waitingMsg.style.display = 'none';
                } else {
                    startBtn.style.display = 'none';
                    waitingMsg.style.display = 'block';
                    waitingMsg.innerText = "ממתין לעוד שחקנים...";
                }
            } else { 
                isMyHost = false;
                startBtn.style.display = 'none';
                waitingMsg.style.display = 'block';
                waitingMsg.innerText = "ממתין למנהל החדר שיתחיל...";
            }
        });

        socket.on('startRound', (data) => {
            setupGameUI(data.prize, data.roundCount, data.players);
        });

        socket.on('playerPlayed', (playersData) => {
            renderBoard(playersData);
        });

        function renderRoundResult(data) {
            renderBoard(data.players, data.playedCards);
            const myPlayed = data.playedCards.find(pc => pc.id === mySessionId);
            if (myPlayed) myHand = myHand.filter(val => val !== myPlayed.card);
            
            let resultText = "";
            if (data.winnerId) {
                const winnerName = data.playedCards.find(p => p.id === data.winnerId).name;
                resultText = `המנצח הוא ${winnerName}!`;
            } else {
                resultText = `תיקו! הקלף נזרק.`;
            }
            document.getElementById('status-message').innerText = resultText;
            renderHand(true);
        }

        socket.on('roundResult', (data) => {
            renderRoundResult(data);
        });

        socket.on('gameOver', (players) => {
            let sortedPlayers = Object.values(players).sort((a, b) => b.score - a.score);
            let endMsg = "המשחק נגמר!\n\nתוצאות סופיות:\n";
            sortedPlayers.forEach((p, i) => {
                endMsg += `${i+1}. ${p.name} - ${p.score} נקודות\n`;
            });
            alert(endMsg);
            switchScreen('lobby-screen');
            myHand = [];
        });

        socket.on('errorMsg', (msg) => { 
            alert(msg);
            if(msg === 'המשחק כבר התחיל.') {
                localStorage.removeItem('holsPlayerName');
                localStorage.removeItem('holsSessionId');
                switchScreen('login-screen');
                location.reload();
            }
        });
    </script>
</body>
</html>
