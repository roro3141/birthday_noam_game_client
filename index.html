<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק קלפים רשת</title>
    <style>
        :root {
            --bg-color: #2c3e50;
            --card-bg: #ecf0f1;
            --primary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --text: #34495e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #lobby, #game-board { display: none; width: 100%; max-width: 800px; text-align: center; }
        .active { display: block !important; }
        
        /* כרטיסים ואנימציות */
        .card {
            background: var(--card-bg);
            color: var(--text);
            width: 60px;
            height: 90px;
            border-radius: 8px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            margin: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            user-select: none;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 8px 12px rgba(0,0,0,0.4); }
        .card.disabled { opacity: 0.5; pointer-events: none; transform: none; }
        
        .prize-card {
            width: 100px;
            height: 150px;
            font-size: 40px;
            margin: 20px auto;
            cursor: default;
            animation: flipIn 0.6s ease-out;
        }
        .prize-positive { color: var(--success); }
        .prize-negative { color: var(--danger); }
        
        @keyframes flipIn {
            0% { transform: rotateY(90deg) scale(0.8); opacity: 0; }
            100% { transform: rotateY(0deg) scale(1); opacity: 1; }
        }

        /* רשימת שחקנים */
        .players-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .player-badge {
            background: rgba(255,255,255,0.1);
            padding: 10px 15px;
            border-radius: 20px;
            transition: background 0.3s;
        }
        .player-badge.played { background: var(--success); }
        
        /* הודעות */
        #status-message {
            font-size: 1.2rem;
            margin: 15px 0;
            min-height: 30px;
            color: #f1c40f;
        }
        
        input, button {
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            margin: 5px;
        }
        button { background-color: var(--primary); color: white; cursor: pointer; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div id="lobby" class="active">
        <h1>משחק קלפים</h1>
        <input type="text" id="playerName" placeholder="הכנס את שמך..." maxlength="10">
        <button onclick="joinGame()">הצטרף למשחק</button>
        <div id="lobby-players" style="margin-top: 20px;"></div>
        <button id="start-btn" onclick="startGame()" style="display:none; margin-top: 20px; background-color: var(--success);">התחל משחק</button>
    </div>

    <div id="game-board">
        <div class="players-container" id="players-list"></div>
        
        <div style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px;">
            <h2>קלף האמצע</h2>
            <div id="prize-container"></div>
            <div id="status-message">ממתין לתחילת הסיבוב...</div>
        </div>

        <h3 style="margin-top: 30px;">הקלפים שלך</h3>
        <div id="my-hand"></div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io('https://game-server-gwy6.onrender.com');
        
        let myHand = [];
        let myId = null;

        // --- פונקציות ממשק ---
        function switchScreen(screenId) {
            document.getElementById('lobby').classList.remove('active');
            document.getElementById('game-board').classList.remove('active');
            document.getElementById(screenId).classList.add('active');
        }

        function renderHand(disabled = false) {
            const handDiv = document.getElementById('my-hand');
            handDiv.innerHTML = '';
            myHand.forEach((val, index) => {
                const card = document.createElement('div');
                card.className = `card ${disabled ? 'disabled' : ''}`;
                card.innerText = val;
                card.onclick = () => playCard(index);
                handDiv.appendChild(card);
            });
        }

        function renderPlayers(playersData) {
            const listDiv = document.getElementById('players-list');
            listDiv.innerHTML = '';
            for (let id in playersData) {
                const p = playersData[id];
                const badge = document.createElement('div');
                badge.className = `player-badge ${p.hasPlayed ? 'played' : ''}`;
                badge.innerText = `${p.name} | ניקוד: ${p.score}`;
                listDiv.appendChild(badge);
            }
        }

        // --- פעולות שחקן ---
        function joinGame() {
            const name = document.getElementById('playerName').value.trim();
            if (name) socket.emit('joinGame', name);
        }

        function startGame() {
            socket.emit('startGame');
        }

        function playCard(index) {
            socket.emit('playCard', index);
            renderHand(true); // משבית את היד עד הסיבוב הבא
            document.getElementById('status-message').innerText = "ממתין לשאר השחקנים...";
        }

        // --- מאזינים לשרת ---
        socket.on('joined', (data) => {
            myId = data.id;
            myHand = data.hand;
        });

        socket.on('updateLobby', (playerNames) => {
            document.getElementById('lobby-players').innerText = 'שחקנים בחדר: ' + playerNames.join(', ');
            if (playerNames.length >= 2) {
                document.getElementById('start-btn').style.display = 'inline-block';
            }
        });

        socket.on('startRound', (data) => {
            switchScreen('game-board');
            renderPlayers(data.players);
            renderHand(false);
            
            const prizeDiv = document.getElementById('prize-container');
            const colorClass = data.prize > 0 ? 'prize-positive' : 'prize-negative';
            prizeDiv.innerHTML = `<div class="card prize-card ${colorClass}">${data.prize > 0 ? '+'+data.prize : data.prize}</div>`;
            
            document.getElementById('status-message').innerText = `סיבוב ${data.roundCount}/15 - בחר קלף מהיד!`;
        });

        socket.on('playerPlayed', (playersData) => {
            renderPlayers(playersData);
        });

        socket.on('roundResult', (data) => {
            renderPlayers(data.players);
            
            let resultText = "הקלפים שנבחרו:\n";
            data.playedCards.forEach(pc => {
                resultText += `${pc.name}: ${pc.card}  `;
                if (pc.id === myId) {
                    // עדכון היד המקומית
                    myHand = myHand.filter(val => val !== pc.card);
                }
            });
            
            if (data.winnerId) {
                const winnerName = data.playedCards.find(p => p.id === data.winnerId).name;
                resultText += `\n\nהמנצח בסיבוב הוא ${winnerName} שקיבל את הקלף ${data.prize}!`;
            } else {
                resultText += `\n\nתיקו! אף אחד לא זוכה בקלף האמצע.`;
            }
            
            document.getElementById('status-message').innerText = resultText;
            renderHand(true); // משאיר מושבת עד לסיבוב הבא
        });

        socket.on('gameOver', (players) => {
            let sortedPlayers = Object.values(players).sort((a, b) => b.score - a.score);
            let endMsg = "המשחק נגמר!\nתוצאות סופיות:\n";
            sortedPlayers.forEach((p, i) => {
                endMsg += `${i+1}. ${p.name} - ${p.score} נקודות\n`;
            });
            alert(endMsg);
            location.reload(); // ריענון חזרה ללובי
        });

        socket.on('errorMsg', (msg) => {
            alert(msg);
        });
    </script>
</body>
</html>
